name: 'Setup Droidspaces GKI Support'
description: 'Apply Droidspaces GKI kABI patches and required gki_defconfig options'

inputs:
  kernel_version:
    description: 'Kernel version (e.g., 6.6)'
    required: true

runs:
  using: "composite"
  steps:
    - name: Clone Droidspaces OSS
      shell: bash
      run: |
        set -euo pipefail

        DROIDSPACES_DIR="${{ github.workspace }}/Droidspaces-OSS"
        rm -rf "$DROIDSPACES_DIR"
        git clone --depth=1 https://github.com/ravindu644/Droidspaces-OSS.git "$DROIDSPACES_DIR"

    - name: Apply Droidspaces GKI kABI Patches
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        set -euo pipefail

        KERNEL_VERSION="${{ inputs.kernel_version }}"
        PATCH_ROOT="${{ github.workspace }}/Droidspaces-OSS/Documentation/resources/kernel-patches/GKI"

        version_lt() {
          [ "$(printf '%s\n%s\n' "$1" "$2" | sort -V | head -n1)" = "$1" ] && [ "$1" != "$2" ]
        }

        version_le() {
          [ "$1" = "$2" ] || version_lt "$1" "$2"
        }

        apply_droidspaces_patch() {
          local patch_file="$1"
          local patch_name
          local patch_log

          patch_name="$(basename "$patch_file")"
          patch_log="$(mktemp)"

          if [ ! -f "$patch_file" ]; then
            echo "Droidspaces patch not found: $patch_file"
            exit 1
          fi

          if patch -p1 --forward --dry-run < "$patch_file" >"$patch_log" 2>&1; then
            echo "Applying Droidspaces patch: $patch_name"
            patch -p1 --forward --no-backup-if-mismatch < "$patch_file"
          elif patch -p1 --reverse --dry-run < "$patch_file" >/dev/null 2>&1; then
            echo "Droidspaces patch already applied: $patch_name"
          else
            echo "Failed to apply Droidspaces patch: $patch_name"
            cat "$patch_log"
            exit 1
          fi

          rm -f "$patch_log"
        }

        if version_lt "$KERNEL_VERSION" "6.12"; then
          apply_droidspaces_patch "$PATCH_ROOT/below-kernel-6.12/001.GKI-below-6.12-fix_sysvipc_kabi_6_7_8.patch"
        else
          apply_droidspaces_patch "$PATCH_ROOT/kernel-6.12/001.GKI-6.12-or-above-fix_sysvipc_kabi.patch"
        fi

        if version_le "$KERNEL_VERSION" "5.10"; then
          apply_droidspaces_patch "$PATCH_ROOT/below-kernel-6.12/002.5.10_or_lower_use_android_abi_padding_for_posix_mqueue.patch"
        fi

    - name: Configure Droidspaces GKI Defconfig
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        set -euo pipefail

        DEFCONFIG="arch/arm64/configs/gki_defconfig"

        if [ ! -f "$DEFCONFIG" ]; then
          echo "gki_defconfig not found: $DEFCONFIG"
          exit 1
        fi

        REQUIRED_CONFIGS=(
          CONFIG_NETFILTER
          CONFIG_NETFILTER_ADVANCED
          CONFIG_NETFILTER_XTABLES
          CONFIG_SYSVIPC
          CONFIG_POSIX_MQUEUE
          CONFIG_IPC_NS
          CONFIG_PID_NS
          CONFIG_DEVTMPFS
          CONFIG_NETFILTER_XT_MATCH_ADDRTYPE
          CONFIG_IP_NF_IPTABLES
          CONFIG_IP_NF_FILTER
          CONFIG_IP_NF_TARGET_REJECT
          CONFIG_IP6_NF_IPTABLES
          CONFIG_IP6_NF_FILTER
          CONFIG_IP6_NF_TARGET_REJECT
          CONFIG_NETFILTER_XT_TARGET_LOG
          CONFIG_NETFILTER_XT_MATCH_RECENT
          CONFIG_IP_SET
          CONFIG_IP_SET_HASH_IP
          CONFIG_IP_SET_HASH_NET
          CONFIG_NETFILTER_XT_SET
        )

        set_config() {
          local name="$1"

          if grep -Eq "^(# ${name} is not set|${name}=)" "$DEFCONFIG"; then
            sed -i -E "s/^# ${name} is not set$/${name}=y/; s/^${name}=.*/${name}=y/" "$DEFCONFIG"
          else
            printf '%s=y\n' "$name" >> "$DEFCONFIG"
          fi
        }

        for config in "${REQUIRED_CONFIGS[@]}"; do
          set_config "$config"
        done

        OUT_DIR="${{ github.workspace }}/kernel/out/droidspaces-defconfig"
        mkdir -p "$OUT_DIR"

        BUILD_TOOLS="${{ github.workspace }}/kernel/build/build-tools/path/linux-x86"
        if [ -d "$BUILD_TOOLS" ]; then
          export PATH="$BUILD_TOOLS:$PATH"
        fi

        for clang in "${{ github.workspace }}"/kernel/prebuilts*/clang/host/linux-x86/clang-*/bin/clang; do
          if [ -x "$clang" ]; then
            export PATH="$(dirname "$clang"):$PATH"
            break
          fi
        done

        make ARCH=arm64 LLVM=1 LLVM_IAS=1 O="$OUT_DIR" gki_defconfig

        for config in "${REQUIRED_CONFIGS[@]}"; do
          if ! grep -qx "${config}=y" "$OUT_DIR/.config"; then
            echo "Required Droidspaces config is not enabled: $config"
            exit 1
          fi
        done

        make ARCH=arm64 LLVM=1 LLVM_IAS=1 O="$OUT_DIR" savedefconfig
        cp "$OUT_DIR/defconfig" "$DEFCONFIG"
